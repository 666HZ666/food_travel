    {
            box-sizing: border-box;
            margin: 0;

        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
           
            font-family: 'Segoe UI', sans-serif;
        }

        /* 容器样式 */
        .select-container {
            width: 90%;
            max-width: 400px;
            margin: 20px;
        }

        /* 标签样式 */
        .select-label {
            display: block;
            margin-bottom: 12px;
            color: #2c3e50;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* 下拉列表主体 */
        .custom-select {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1),
                       -5px -5px 15px rgba(255,255,255,0.8);
            font-size: 16px;
            color: #34495e;
            appearance: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* 鼠标悬停效果 */
        .custom-select:hover {
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1),
                      -3px -3px 10px rgba(255,255,255,0.8);
        }

        /* 聚焦状态 */
        .custom-select:focus {
            outline: none;
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.1),
                      inset -3px -3px 6px rgba(255,255,255,0.8);
        }

        /* 自定义下拉箭头 */
        .select-container::after {
            content: "▼";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #3498db;
            font-size: 12px;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        /* 展开动画 */
        .custom-select:focus ~ .select-container::after {
            transform: translateY(-50%) rotate(180deg);
        }

        /* 选项样式 */
        .custom-select option {
            padding: 15px 20px;
            background: #ffffff;
            color: #2c3e50;
            border-bottom: 1px solid #ecf0f1;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .custom-select {
                padding: 12px 40px 12px 15px;
                font-size: 14px;
            }
        }

        /* 高级玻璃拟态效果（可选） */
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .fixed-button {
    position: fixed;     /* 固定定位 */
    bottom: 20px;       /* 距离底部20px */
    right: 20px;        /* 距离右侧20px */
    padding: 15px 30px; /* 按钮内边距 */
    background-color: #vewda; /* 背景颜色 */
    color: white;       /* 文字颜色 */
    border: none;       /* 移除边框 */
    border-radius: 5px; /* 圆角边框 */
    cursor: pointer;    /* 鼠标手势 */
    font-size: 16px;    /* 文字大小 */
    z-index: 1000;      /* 确保在最上层 */
    transition: background-color 0.3s; /* 颜色过渡效果 */
}

/* 悬停效果 */
.fixed-button:hover {
    background-color: #ve; /* 更深的绿色 */
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); /* 添加阴影 */

 document.onkeydown = function(){
